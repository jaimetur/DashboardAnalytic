name: ▶️ Build All

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub release"
        required: false
        default: false
        type: boolean
      final_release:
        description: "Mark this as a final release"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

jobs:
  build-docker:
    uses: ./.github/workflows/build_docker.yml
    with:
      create_release: ${{ github.event_name == 'workflow_dispatch' && inputs.create_release || false }}
      final_release: ${{ github.event_name == 'workflow_dispatch' && inputs.final_release || false }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}

  package-source:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          APP_VERSION=$(python - <<'PY'
          from src.version import __version__
          print(__version__)
          PY
          )
          echo "app_version=${APP_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=v${APP_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Create source archive
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.app_version }}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          mkdir -p dist
          zip -r "dist/DashboardAnalytic_${VERSION}_source.zip" src tests docker data config help README.md CHANGELOG.md ROADMAP.md DOWNLOAD.md CONTRIBUTING.md CODE_OF_CONDUCT.md requirements.txt pyproject.toml .github

      - name: Upload source artifact
        uses: actions/upload-artifact@v7
        with:
          name: DashboardAnalytic_source_bundle
          path: dist/*.zip

      - name: Build release notes from changelog
        id: release_notes
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.app_version }}"
          python - <<'PY'
          from pathlib import Path
          import os
          import re
          import sys

          version = os.environ["VERSION"]
          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          pattern = re.compile(
              rf"^##\s+{re.escape(version)}\s*-\s*.+?(?=^##\s+|\Z)",
              re.MULTILINE | re.DOTALL,
          )
          match = pattern.search(changelog)
          if not match:
              print(f"Release notes for version {version} were not found in CHANGELOG.md", file=sys.stderr)
              sys.exit(1)

          release_notes = match.group(0).strip() + "\n"
          output_path = Path("dist/release_notes.md")
          output_path.write_text(release_notes, encoding="utf-8")
          print(output_path)
          PY
        env:
          VERSION: ${{ steps.version.outputs.app_version }}

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.create_release == true)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
          RELEASE_NAME: ${{ steps.version.outputs.release_tag }}
          TARGET_COMMITISH: ${{ github.sha }}
          PRERELEASE_FLAG: ${{ inputs.final_release != true }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists. Updating body and assets."
            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_NAME}" \
              --notes-file dist/release_notes.md
            gh release upload "${RELEASE_TAG}" dist/*.zip --clobber
          else
            echo "Release ${RELEASE_TAG} does not exist. Creating it."
            gh release create "${RELEASE_TAG}" dist/*.zip \
              --title "${RELEASE_NAME}" \
              --target "${TARGET_COMMITISH}" \
              --notes-file dist/release_notes.md \
              $([[ "${PRERELEASE_FLAG}" == "true" ]] && echo "--prerelease")
          fi
