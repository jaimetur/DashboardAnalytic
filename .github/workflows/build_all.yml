name: Build All

on:
  workflow_dispatch:
    inputs:
      final_release:
        description: "Mark this as a final release"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

jobs:
  unit-tests:
    uses: ./.github/workflows/unit-tests.yml

  build-docker:
    needs: unit-tests
    uses: ./.github/workflows/build_docker.yml
    with:
      final_release: ${{ github.event_name == 'workflow_dispatch' && inputs.final_release || false }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  package-source:
    needs: unit-tests
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create source archive
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          [ -n "$VERSION" ] || VERSION="manual"
          mkdir -p dist
          zip -r "dist/BenchAutomations_${VERSION}_source.zip" src tests docker data config help README.md CHANGELOG.md ROADMAP.md DOWNLOAD.md CONTRIBUTING.md CODE_OF_CONDUCT.md requirements.txt pyproject.toml .github

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: BenchAutomations_source_bundle
          path: dist/*.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
