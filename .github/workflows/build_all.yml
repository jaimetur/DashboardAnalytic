name: ▶️ Build All

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub release"
        required: false
        default: false
        type: boolean
      final_release:
        description: "Mark this as a final release"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

jobs:
  build-docker:
    uses: ./.github/workflows/build_docker.yml
    with:
      create_release: ${{ github.event_name == 'workflow_dispatch' && inputs.create_release || false }}
      final_release: ${{ github.event_name == 'workflow_dispatch' && inputs.final_release || false }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}

  package-source:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          APP_VERSION=$(python - <<'PY'
          from src.version import __version__
          print(__version__)
          PY
          )
          echo "app_version=${APP_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=v${APP_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Create source archive
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.app_version }}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          mkdir -p dist
          zip -r "dist/DashboardAnalytic_${VERSION}_source.zip" src tests docker data config help README.md CHANGELOG.md ROADMAP.md DOWNLOAD.md CONTRIBUTING.md CODE_OF_CONDUCT.md requirements.txt pyproject.toml .github

      - name: Upload source artifact
        uses: actions/upload-artifact@v7
        with:
          name: DashboardAnalytic_source_bundle
          path: dist/*.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.create_release == true)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: ${{ steps.version.outputs.release_tag }}
          files: dist/*.zip
          generate_release_notes: true
