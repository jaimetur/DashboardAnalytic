name: Build Docker

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub release package"
        type: boolean
        required: false
        default: false
      final_release:
        description: "Mark this as a final release"
        type: boolean
        required: false
        default: false
  workflow_call:
    inputs:
      final_release:
        required: false
        type: boolean
        default: false
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
  push:
    branches: [main]
    tags: ['v*']

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/bench-automations
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/dockerfile
          push: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Prepare Docker package
        run: |
          mkdir -p dist/BenchAutomations/docker
          cp docker/docker-compose.yml dist/BenchAutomations/docker/
          cp docker/docker-compose-dev.yml dist/BenchAutomations/docker/
          cp docker/.env dist/BenchAutomations/docker/.env
          cp docker/EXECUTION-INSTRUCTIONS.txt dist/BenchAutomations/docker/
          cp docker/run-docker-dev.sh dist/BenchAutomations/docker/
          cp README.md CHANGELOG.md ROADMAP.md DOWNLOAD.md CONTRIBUTING.md CODE_OF_CONDUCT.md dist/BenchAutomations/
          cp -R help dist/BenchAutomations/help
          cd dist && zip -r BenchAutomations_docker_bundle.zip BenchAutomations

      - name: Upload Docker package artifact
        uses: actions/upload-artifact@v4
        with:
          name: BenchAutomations_docker_bundle
          path: dist/BenchAutomations_docker_bundle.zip
