name: 🐳 Build Docker

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub release package"
        type: boolean
        required: false
        default: false
      final_release:
        description: "Mark this as a final release"
        type: boolean
        required: false
        default: false
  workflow_call:
    inputs:
      create_release:
        required: false
        type: boolean
        default: false
      final_release:
        required: false
        type: boolean
        default: false
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: false
      DOCKERHUB_PASSWORD:
        required: false
  push:
    branches: [main]
    tags: ['v*']

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve image metadata
        id: image
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        shell: bash
        run: |
          APP_VERSION=$(python - <<'PY'
          from src.version import __version__
          print(__version__)
          PY
          )
          USERNAME_VALUE="${DOCKERHUB_USERNAME}"
          if [ -z "${USERNAME_VALUE}" ]; then
            USERNAME_VALUE="${GITHUB_REPOSITORY_OWNER}"
          fi
          IMAGE_NAME="${USERNAME_VALUE}/dashboard-analytic"
          RAW_REF="${GITHUB_REF_NAME}"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION_TAG="${RAW_REF#v}"
          else
            VERSION_TAG="${APP_VERSION}"
          fi

          echo "app_version=${APP_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "image_name=${IMAGE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "version_tag=${VERSION_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Resolve Docker Hub credentials
        id: dockerhub_auth
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        shell: bash
        run: |
          USERNAME_VALUE="${DOCKERHUB_USERNAME}"
          if [ -z "${USERNAME_VALUE}" ]; then
            USERNAME_VALUE="${GITHUB_REPOSITORY_OWNER}"
          fi

          PASSWORD_VALUE="${DOCKERHUB_TOKEN}"
          if [ -z "${PASSWORD_VALUE}" ]; then
            PASSWORD_VALUE="${DOCKERHUB_PASSWORD}"
          fi

          if [ -z "${USERNAME_VALUE}" ] || [ -z "${PASSWORD_VALUE}" ]; then
            echo "Docker Hub credentials are missing. Define DOCKERHUB_USERNAME and DOCKERHUB_TOKEN or DOCKERHUB_PASSWORD." >&2
            exit 1
          fi

          echo "::add-mask::${PASSWORD_VALUE}"
          echo "username=${USERNAME_VALUE}" >> "${GITHUB_OUTPUT}"
          echo "password=${PASSWORD_VALUE}" >> "${GITHUB_OUTPUT}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ steps.dockerhub_auth.outputs.username }}
          password: ${{ steps.dockerhub_auth.outputs.password }}

      - name: Build Docker image
        shell: bash
        run: |
          docker build --pull --no-cache \
            -t "${{ steps.image.outputs.image_name }}:${{ steps.image.outputs.version_tag }}" \
            -f docker/dockerfile .

      - name: Push release or version tag
        shell: bash
        run: |
          docker push "${{ steps.image.outputs.image_name }}:${{ steps.image.outputs.version_tag }}"

      - name: Push latest and main tags
        if: ${{ github.ref == 'refs/heads/main' }}
        shell: bash
        run: |
          docker tag "${{ steps.image.outputs.image_name }}:${{ steps.image.outputs.version_tag }}" "${{ steps.image.outputs.image_name }}:main"
          docker push "${{ steps.image.outputs.image_name }}:main"
          docker tag "${{ steps.image.outputs.image_name }}:${{ steps.image.outputs.version_tag }}" "${{ steps.image.outputs.image_name }}:latest"
          docker push "${{ steps.image.outputs.image_name }}:latest"

      - name: Push latest tag for versioned release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        shell: bash
        run: |
          docker tag "${{ steps.image.outputs.image_name }}:${{ steps.image.outputs.version_tag }}" "${{ steps.image.outputs.image_name }}:latest"
          docker push "${{ steps.image.outputs.image_name }}:latest"

      - name: Prepare Docker package
        run: |
          mkdir -p dist/DashboardAnalytic/docker
          cp docker/docker-compose.yml dist/DashboardAnalytic/docker/
          cp docker/docker-compose-dev.yml dist/DashboardAnalytic/docker/
          cp docker/.env dist/DashboardAnalytic/docker/.env
          cp docker/EXECUTION-INSTRUCTIONS.txt dist/DashboardAnalytic/docker/
          cp docker/run-docker-dev.sh dist/DashboardAnalytic/docker/
          cp README.md CHANGELOG.md ROADMAP.md DOWNLOAD.md CONTRIBUTING.md CODE_OF_CONDUCT.md dist/DashboardAnalytic/
          cp -R help dist/DashboardAnalytic/help
          cd dist && zip -r DashboardAnalytic_docker_bundle.zip DashboardAnalytic

      - name: Upload Docker package artifact
        uses: actions/upload-artifact@v7
        with:
          name: DashboardAnalytic_docker_bundle
          path: dist/DashboardAnalytic_docker_bundle.zip
