name: Build Docker

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub release package"
        type: boolean
        required: false
        default: false
      final_release:
        description: "Mark this as a final release"
        type: boolean
        required: false
        default: false
  workflow_call:
    inputs:
      final_release:
        required: false
        type: boolean
        default: false
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
  push:
    branches: [main]
    tags: ['v*']

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Detect Docker Hub publishing configuration
        id: dockerhub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "${DOCKERHUB_USERNAME}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
            echo "image=${DOCKERHUB_USERNAME}/dashboard-analytic" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "image=dashboard-analytic" >> "${GITHUB_OUTPUT}"
          fi

      - name: Log in to Docker Hub
        if: ${{ steps.dockerhub.outputs.enabled == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.dockerhub.outputs.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/dockerfile
          push: ${{ steps.dockerhub.outputs.enabled == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Prepare Docker package
        run: |
          mkdir -p dist/DashboardAnalytic/docker
          cp docker/docker-compose.yml dist/DashboardAnalytic/docker/
          cp docker/docker-compose-dev.yml dist/DashboardAnalytic/docker/
          cp docker/.env dist/DashboardAnalytic/docker/.env
          cp docker/EXECUTION-INSTRUCTIONS.txt dist/DashboardAnalytic/docker/
          cp docker/run-docker-dev.sh dist/DashboardAnalytic/docker/
          cp README.md CHANGELOG.md ROADMAP.md DOWNLOAD.md CONTRIBUTING.md CODE_OF_CONDUCT.md dist/DashboardAnalytic/
          cp -R help dist/DashboardAnalytic/help
          cd dist && zip -r DashboardAnalytic_docker_bundle.zip DashboardAnalytic

      - name: Upload Docker package artifact
        uses: actions/upload-artifact@v4
        with:
          name: DashboardAnalytic_docker_bundle
          path: dist/DashboardAnalytic_docker_bundle.zip
