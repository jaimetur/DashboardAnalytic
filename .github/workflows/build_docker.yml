name: Build Docker

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub release package"
        type: boolean
        required: false
        default: false
      final_release:
        description: "Mark this as a final release"
        type: boolean
        required: false
        default: false
  workflow_call:
    inputs:
      final_release:
        required: false
        type: boolean
        default: false
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
  push:
    branches: [main]
    tags: ['v*']

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve image metadata
        id: image
        shell: bash
        run: |
          APP_VERSION=$(python - <<'PY'
          from src.version import __version__
          print(__version__)
          PY
          )
          IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/dashboard-analytic"
          RAW_REF="${GITHUB_REF_NAME}"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION_TAG="${RAW_REF}"
          else
            VERSION_TAG="v${APP_VERSION}"
          fi

          echo "app_version=${APP_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "image_name=${IMAGE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "version_tag=${VERSION_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        shell: bash
        run: |
          docker build --pull --no-cache \
            -t "${{ steps.image.outputs.image_name }}:${{ steps.image.outputs.version_tag }}" \
            -f docker/dockerfile .

      - name: Push release or version tag
        shell: bash
        run: |
          docker push "${{ steps.image.outputs.image_name }}:${{ steps.image.outputs.version_tag }}"

      - name: Push latest and main tags
        if: ${{ github.ref == 'refs/heads/main' }}
        shell: bash
        run: |
          docker tag "${{ steps.image.outputs.image_name }}:${{ steps.image.outputs.version_tag }}" "${{ steps.image.outputs.image_name }}:main"
          docker push "${{ steps.image.outputs.image_name }}:main"
          docker tag "${{ steps.image.outputs.image_name }}:${{ steps.image.outputs.version_tag }}" "${{ steps.image.outputs.image_name }}:latest"
          docker push "${{ steps.image.outputs.image_name }}:latest"

      - name: Push latest tag for versioned release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        shell: bash
        run: |
          docker tag "${{ steps.image.outputs.image_name }}:${{ steps.image.outputs.version_tag }}" "${{ steps.image.outputs.image_name }}:latest"
          docker push "${{ steps.image.outputs.image_name }}:latest"

      - name: Prepare Docker package
        run: |
          mkdir -p dist/DashboardAnalytic/docker
          cp docker/docker-compose.yml dist/DashboardAnalytic/docker/
          cp docker/docker-compose-dev.yml dist/DashboardAnalytic/docker/
          cp docker/.env dist/DashboardAnalytic/docker/.env
          cp docker/EXECUTION-INSTRUCTIONS.txt dist/DashboardAnalytic/docker/
          cp docker/run-docker-dev.sh dist/DashboardAnalytic/docker/
          cp README.md CHANGELOG.md ROADMAP.md DOWNLOAD.md CONTRIBUTING.md CODE_OF_CONDUCT.md dist/DashboardAnalytic/
          cp -R help dist/DashboardAnalytic/help
          cd dist && zip -r DashboardAnalytic_docker_bundle.zip DashboardAnalytic

      - name: Upload Docker package artifact
        uses: actions/upload-artifact@v7
        with:
          name: DashboardAnalytic_docker_bundle
          path: dist/DashboardAnalytic_docker_bundle.zip
